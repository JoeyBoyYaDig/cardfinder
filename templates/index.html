{% extends "base.html" %}

{% block content %}
  <section class="search-panel">
    <div class="intro">
      <p class="eyebrow">Pokémon TCG lookup</p>
      <h1>Find card details and market links fast.</h1>
      <p class="lede">Search official Pokémon TCG API card data, then jump to marketplace searches for the exact card.</p>
    </div>

    <form class="search-form" action="{{ url_for('results') }}" method="get">
      <label for="q">Card name or number</label>
      <div class="search-row">
        <input id="q" name="q" type="search" placeholder="Raichu, 29/62, SM108, raichu first edition..." required autofocus>
        <button type="submit">Search</button>
      </div>
      <div class="search-options">
        <label>
          <span>Sort by</span>
          <select name="sort">
            <option value="name">Name</option>
            <option value="set">Set</option>
            <option value="number">Card number</option>
            <option value="newest">Newest set</option>
            <option value="oldest">Oldest set</option>
            <option value="price_low">Price: low to high</option>
            <option value="price_high">Price: high to low</option>
          </select>
        </label>
        <label class="checkbox-option">
          <input type="checkbox" name="full_art" value="1">
          <span>Full art only</span>
        </label>
      </div>
    </form>
  </section>
{% endblock %}
